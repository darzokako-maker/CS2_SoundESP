name: CS2 Terminal ESP EXE Builder

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Gerekli Kütüphaneleri Doğrudan Kur
      run: |
        python -m pip install --upgrade pip
        pip install pyMeow==1.5.3 pyinstaller==6.5.0

    - name: PyInstaller ile Hatasız ve Eksiksiz EXE Üret
      run: |
        pyinstaller --onefile --clean --collect-all pyMeow --name="CS2_Terminal_ESP" main.py

    - name: Üretilen EXE Dosyasını Çıktı Olarak Paylaş
      uses: actions/upload-artifact@v4
      with:
        name: CS2_Terminal_ESP_Executable
        path: dist/CS2_Terminal_ESP.exe
        
