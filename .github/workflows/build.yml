name: Build CS2 Tactical Radar

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyarmor

    - name: Obfuscate Source Code
      run: |
        # main.py dosyasını obfuscate eder ve çıktıları 'dist' klasörüne koyar
        pyarmor obfuscate main.py
        # PyInstaller'ın şifrelenmiş kodu doğru paketlemesi için ana dizine taşıyoruz
        copy dist\main.py .\main_obf.py

    - name: Build Hidden Admin EXE with Maps Embedded
      run: |
        # Senin orijinal PyInstaller komutun, sadece girdi olarak şifrelenmiş dosya verildi
        pyinstaller --noconsole --onefile --uac-admin --add-data "*.png;." --name="main" main_obf.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CS2-Tactical-Radar-EXE
        path: dist/main.exe
        
