name: Build CS2 Tactical Radar

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-color: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build Hidden Admin EXE with Maps Embedded
      run: |
        # --noconsole: Konsol ekranını tamamen gizler.
        # --uac-admin: Hafıza okumak için gereken Yönetici İznini (Admin) otomatik ister.
        # --add-data: Ana dizindeki tüm .png harita görsellerini exe'nin içine paketler.
        pyinstaller --noconsole --onefile --uac-admin --add-data "*.png;." main.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CS2-Tactical-Radar-EXE
        path: dist/main.exe
        
