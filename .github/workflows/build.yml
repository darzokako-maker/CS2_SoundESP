name: CS2 Web Radar EXE Builder

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: PyInstaller Aracini Yukle
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller==6.5.0

    - name: Web Radar Kodunu Tek Parca EXE Olarak Derle
      run: |
        pyinstaller --onefile --clean --name="CS2_Web_Radar" main.py

    - name: Uretilen Web Radar EXE Dosyasini Paylas
      uses: actions/upload-artifact@v4
      with:
        name: CS2_Web_Radar_Executable
        path: dist/CS2_Web_Radar.exe
        
